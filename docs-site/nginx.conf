server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static site
    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy → AgentRegistry (in-cluster)
    location /proxy/registry/ {
        proxy_pass http://agentregistry.agentregistry.svc.cluster.local:8080/;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
    }

    # Reverse proxy → kagent controller API (in-cluster)
    location /proxy/kagent/ {
        proxy_pass http://kagent-controller.kagent.svc.cluster.local:8083/;
        proxy_set_header Host $host;
    }

    # Reverse proxy → Management UI (for embedded chat iframe)
    # Strips X-Frame-Options so it can be embedded, rewrites asset paths
    location /mgmt/ {
        proxy_pass http://solo-enterprise-ui.kagent.svc.cluster.local:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Reverse proxy → Auto-auth IDP (for OIDC flow in iframe)
    location /mgmt-auth/ {
        proxy_pass http://solo-enterprise-ui.kagent.svc.cluster.local:5556/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }
}
