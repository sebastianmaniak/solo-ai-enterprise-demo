apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-incident-tools
  namespace: bank-wiki
  labels:
    app: bank-incident-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-incident-tools
  template:
    metadata:
      labels:
        app: bank-incident-tools
    spec:
      containers:
      - name: incident-tools
        image: bank-incident-tools:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8086
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bank-incident-tools
  namespace: bank-wiki
spec:
  selector:
    app: bank-incident-tools
  ports:
  - port: 8086
    targetPort: 8086
