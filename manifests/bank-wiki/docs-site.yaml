apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-docs-site
  namespace: bank-wiki
  labels:
    app: bank-docs-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-docs-site
  template:
    metadata:
      labels:
        app: bank-docs-site
    spec:
      containers:
      - name: docs
        image: bank-docs-site:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bank-docs-site
  namespace: bank-wiki
spec:
  type: NodePort
  selector:
    app: bank-docs-site
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30500
