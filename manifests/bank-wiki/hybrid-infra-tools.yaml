apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybrid-infra-tools
  namespace: bank-wiki
  labels:
    app: hybrid-infra-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hybrid-infra-tools
  template:
    metadata:
      labels:
        app: hybrid-infra-tools
    spec:
      containers:
      - name: hybrid-infra-tools
        image: hybrid-infra-tools:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8087
        readinessProbe:
          httpGet:
            path: /health
            port: 8087
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hybrid-infra-tools
  namespace: bank-wiki
spec:
  selector:
    app: hybrid-infra-tools
  ports:
  - port: 8087
    targetPort: 8087
