## ── MCP servers routed through AgentGateway ──────────────────────────
## Used by: customer-service, mortgage-advisor, compliance agents
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: bank-customer-tools
  namespace: kagent
  labels:
    solo.io/mcp-routing: agentgateway
spec:
  url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/customer
  protocol: STREAMABLE_HTTP
  description: "Solo Bank customer data tools — lookup, search, account balances [MCP via AgentGateway]"
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: bank-policy-tools
  namespace: kagent
  labels:
    solo.io/mcp-routing: agentgateway
spec:
  url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/policy
  protocol: STREAMABLE_HTTP
  description: "Solo Bank policy and rates tools — lending policies, rate tables, credit tier lookups [MCP via AgentGateway]"
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: bank-transaction-tools
  namespace: kagent
  labels:
    solo.io/mcp-routing: agentgateway
spec:
  url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/transaction
  protocol: STREAMABLE_HTTP
  description: "Solo Bank transaction and account tools — transaction history, account details, search [MCP via AgentGateway]"
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: hybrid-infra-tools
  namespace: kagent
  labels:
    solo.io/mcp-routing: agentgateway
spec:
  url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/hybrid-infra
  protocol: STREAMABLE_HTTP
  description: "Solo Bank hybrid infrastructure tools — topology, firewall rules, NAT, routing, incident scenarios [MCP via AgentGateway]"
---
