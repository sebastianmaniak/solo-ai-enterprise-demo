apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-summary-tools
  namespace: bank-wiki
  labels:
    app: account-summary-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-summary-tools
  template:
    metadata:
      labels:
        app: account-summary-tools
    spec:
      containers:
      - name: summary-tools
        image: account-summary-tools:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8084
        env:
        - name: WIKI_SERVER_URL
          value: "http://bank-wiki-server.bank-wiki.svc.cluster.local:8080"
        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: account-summary-tools
  namespace: bank-wiki
spec:
  selector:
    app: account-summary-tools
  ports:
  - port: 8084
    targetPort: 8084
