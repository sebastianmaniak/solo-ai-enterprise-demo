# Static IP reservation (created by setup.sh via gcloud)
# gcloud compute addresses create solo-bank-demo-ip --global

---
# Google-managed TLS certificate
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: solo-bank-cert
  namespace: bank-wiki
spec:
  domains:
    - bank-demo.maniak.io
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: solo-bank-mgmt-cert
  namespace: kagent
spec:
  domains:
    - mgmt.bank-demo.maniak.io
---
# FrontendConfig for HTTPS redirect
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: ssl-redirect
  namespace: bank-wiki
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: ssl-redirect
  namespace: kagent
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
---
# BackendConfig for health checks (docs site)
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: docs-health
  namespace: bank-wiki
spec:
  healthCheck:
    checkIntervalSec: 15
    port: 8080
    type: HTTP
    requestPath: /
---
# BackendConfig for health checks (wiki)
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: wiki-health
  namespace: bank-wiki
spec:
  healthCheck:
    checkIntervalSec: 15
    port: 8080
    type: HTTP
    requestPath: /health
---
# BackendConfig for Management UI
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: mgmt-health
  namespace: kagent
spec:
  healthCheck:
    checkIntervalSec: 15
    port: 8090
    type: HTTP
    requestPath: /
---
# Ingress: Docs site (bank-demo.maniak.io)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solo-bank-docs-ingress
  namespace: bank-wiki
  annotations:
    kubernetes.io/ingress.global-static-ip-name: solo-bank-demo-ip
    networking.gke.io/managed-certificates: solo-bank-cert
    networking.gke.io/v1beta1.FrontendConfig: ssl-redirect
spec:
  rules:
  - host: bank-demo.maniak.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bank-docs-site
            port:
              number: 8080
      - path: /health
        pathType: Exact
        backend:
          service:
            name: bank-wiki-server
            port:
              number: 8080
      - path: /wiki
        pathType: Prefix
        backend:
          service:
            name: bank-wiki-server
            port:
              number: 8080
      - path: /search
        pathType: Prefix
        backend:
          service:
            name: bank-wiki-server
            port:
              number: 8080
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: bank-wiki-server
            port:
              number: 8080
---
# Ingress: Management UI (mgmt.bank-demo.maniak.io)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solo-bank-mgmt-ingress
  namespace: kagent
  annotations:
    kubernetes.io/ingress.global-static-ip-name: solo-bank-demo-ip
    networking.gke.io/managed-certificates: solo-bank-mgmt-cert
    networking.gke.io/v1beta1.FrontendConfig: ssl-redirect
spec:
  rules:
  - host: mgmt.bank-demo.maniak.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: solo-enterprise-ui
            port:
              number: 8090
